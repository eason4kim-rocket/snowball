# 雪球（Snowball）配置文件

agent:
  base_url: http://localhost:11434/v1
  model: qwen3.5:9b
  max_tool_iterations: 10

voice_in:
  enabled: false
  engine: realtime_stt
  language: zh
  model: medium
  wake_word:
    enabled: false
    words: ["雪球", "snowball"]

voice_out:
  enabled: false
  engine: macos_say         # macos_say（本地最稳）/ edge_tts（在线，更自然）/ kokoro（本地神经 TTS）
  voice: Ting-Ting          # macos_say 用；edge_tts 换成 zh-CN-XiaoxiaoNeural
  max_length: 50

memory:
  path: SNOWBALL.md

fazm:
  enabled: false
