<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪球 Snowball Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #1e293b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }
        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .sidebar .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .nav-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .nav-item:hover { background: #334155; }
        .nav-item.active { background: #3b82f6; color: white; }

        /* 主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 面板 */
        .panel { display: none; flex: 1; flex-direction: column; }
        .panel.active { display: flex; }

        /* 对话面板 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            max-width: 70%;
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.user {
            background: #3b82f6;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: #334155;
            border-bottom-left-radius: 4px;
        }
        .message.streaming {
            border-left: 3px solid #3b82f6;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #3b82f6; }
        .chat-input-area button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .chat-input-area button:hover { background: #2563eb; }
        .chat-input-area button:disabled { background: #475569; cursor: not-allowed; }
        .chat-input-area .clear-btn {
            background: #475569;
        }
        .chat-input-area .clear-btn:hover { background: #64748b; }

        /* 记忆面板 */
        .memory-panel {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .memory-panel h2 { margin-bottom: 12px; font-size: 18px; }
        .memory-panel textarea {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            font-family: monospace;
            resize: none;
            outline: none;
        }
        .memory-panel textarea:focus { border-color: #3b82f6; }
        .memory-panel .save-bar {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }
        .memory-panel .save-bar .status {
            font-size: 12px;
            color: #94a3b8;
        }

        /* 配置面板 */
        .config-panel {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .config-panel h2 { margin-bottom: 12px; font-size: 18px; }
        .config-panel textarea {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            font-family: monospace;
            resize: none;
            outline: none;
        }
        .config-panel .save-bar {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }

        /* 通用按钮 */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #475569; color: white; }
        .btn-secondary:hover { background: #64748b; }

        /* 连接状态 */
        .status-bar {
            padding: 8px 20px;
            font-size: 12px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        .status-dot.connected { background: #22c55e; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>❄️ 雪球</h1>
        <p class="subtitle">Snowball Dashboard</p>
        <div class="nav-item active" onclick="switchPanel('chat')">💬 对话</div>
        <div class="nav-item" onclick="switchPanel('memory')">🧠 记忆</div>
        <div class="nav-item" onclick="switchPanel('config')">⚙️ 配置</div>
    </div>

    <div class="main">
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>

        <!-- 对话面板 -->
        <div class="panel active" id="panel-chat">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="跟雪球说话..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" id="sendBtn">发送</button>
                <button class="clear-btn" onclick="clearChat()">清除</button>
            </div>
        </div>

        <!-- 记忆面板 -->
        <div class="panel" id="panel-memory">
            <div class="memory-panel">
                <h2>🧠 SNOWBALL.md 记忆文件</h2>
                <textarea id="memoryEditor"></textarea>
                <div class="save-bar">
                    <span class="status" id="memoryStatus"></span>
                    <button class="btn btn-secondary" onclick="loadMemory()">刷新</button>
                    <button class="btn btn-primary" onclick="saveMemory()">保存</button>
                </div>
            </div>
        </div>

        <!-- 配置面板 -->
        <div class="panel" id="panel-config">
            <div class="config-panel">
                <h2>⚙️ config.yaml 配置</h2>
                <textarea id="configEditor"></textarea>
                <div class="save-bar">
                    <span class="status" id="configStatus"></span>
                    <button class="btn btn-secondary" onclick="loadConfig()">刷新</button>
                    <button class="btn btn-primary" onclick="saveConfig()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentStreamEl = null;

        // WebSocket 连接
        function connectWS() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);

            ws.onopen = () => {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = '已连接';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'sentence') {
                    if (!currentStreamEl) {
                        currentStreamEl = addMessage('assistant', '', true);
                    }
                    currentStreamEl.textContent += data.content;
                    scrollToBottom();
                } else if (data.type === 'done') {
                    if (currentStreamEl) {
                        currentStreamEl.classList.remove('streaming');
                    }
                    currentStreamEl = null;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('chatInput').focus();
                }
            };

            ws.onclose = () => {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '已断开，3 秒后重连...';
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => {
                ws.close();
            };
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage('user', text);
            ws.send(text);
            input.value = '';
            document.getElementById('sendBtn').disabled = true;
            scrollToBottom();
        }

        // 添加消息到界面
        function addMessage(role, content, streaming = false) {
            const container = document.getElementById('chatMessages');
            const el = document.createElement('div');
            el.className = `message ${role}${streaming ? ' streaming' : ''}`;
            el.textContent = content;
            container.appendChild(el);
            scrollToBottom();
            return el;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        // 清除对话
        async function clearChat() {
            await fetch('/api/clear', { method: 'POST' });
            document.getElementById('chatMessages').innerHTML = '';
        }

        // 切换面板
        function switchPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`panel-${name}`).classList.add('active');
            event.target.classList.add('active');

            if (name === 'memory') loadMemory();
            if (name === 'config') loadConfig();
        }

        // 记忆管理
        async function loadMemory() {
            const res = await fetch('/api/memory');
            const data = await res.json();
            document.getElementById('memoryEditor').value = data.content;
            document.getElementById('memoryStatus').textContent = '已加载';
        }

        async function saveMemory() {
            const content = document.getElementById('memoryEditor').value;
            await fetch('/api/memory', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content }),
            });
            document.getElementById('memoryStatus').textContent = '已保存';
        }

        // 配置管理
        async function loadConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            document.getElementById('configEditor').value = JSON.stringify(data.config, null, 2);
            document.getElementById('configStatus').textContent = '已加载';
        }

        async function saveConfig() {
            const text = document.getElementById('configEditor').value;
            try {
                const config = JSON.parse(text);
                await fetch('/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ config }),
                });
                document.getElementById('configStatus').textContent = '已保存，Agent 已重置';
            } catch (e) {
                document.getElementById('configStatus').textContent = '格式错误：' + e.message;
            }
        }

        // 初始化
        connectWS();
    </script>
</body>
</html>
